<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Compra Carrito | Summer Piscinas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { 
            --azul-vulcano: #003366; 
            --celeste-agua: #00a8e8; 
        }
        body { 
            background-color: #f4f7f6; 
            font-family: 'Roboto', sans-serif;
        }
        .btn-vulcano { 
            background-color: var(--azul-vulcano); 
            color: white; 
            border-radius: 0; 
            font-weight: bold;
            transition: 0.3s;
            border: none;
        }
        .btn-vulcano:hover { 
            background-color: var(--celeste-agua); 
            color: white; 
        }
        .card {
            border-radius: 10px;
        }
        .item-carrito {
            border-bottom: 1px solid #eee;
            padding-bottom: 8px;
            margin-bottom: 8px;
        }
        .item-carrito:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg border-0 p-4">
                    <h2 class="fw-bold text-center" style="color: var(--azul-vulcano);">Datos de Envío y Pago</h2>
                    <p class="text-center text-muted small">Estás finalizando la compra de tu carrito</p>
                    <hr>
                    
                    <div class="mb-4 p-3 bg-light rounded">
                        <p class="small text-muted mb-2">Resumen de productos:</p>
                        {% for key, value in request.session.carrito.items %}
                        <div class="d-flex justify-content-between align-items-center item-carrito">
                            <div>
                                <h6 class="mb-0 fw-bold">{{ value.nombre }}</h6>
                                <small class="text-muted">Cantidad: {{ value.cantidad }}</small>
                            </div>
                            <span class="fw-bold text-dark">${{ value.total }}</span>
                        </div>
                        {% endfor %}
                        <div class="d-flex justify-content-between align-items-center mt-3 pt-2 border-top">
                            <h5 class="fw-bold">TOTAL:</h5>
                            <h4 class="fw-bold text-primary">${{ total_carrito }}</h4>
                        </div>
                    </div>

                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Nombre Completo</label>
                            <input type="text" name="nombre" class="form-control" placeholder="Juan Pérez" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Email</label>
                            <input type="email" name="email" class="form-control" placeholder="juan@ejemplo.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">WhatsApp</label>
                            <input type="text" name="whatsapp" class="form-control" placeholder="3584123456" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Método de Pago</label>
                            <select name="metodo_pago" class="form-select" required>
                                <option value="MP">Mercado Pago (Tarjetas, Débito, Billetera)</option>
                                <option value="TR">Transferencia Bancaria</option>
                            </select>
                        </div>
                        
                        <button type="submit" class="btn btn-vulcano w-100 py-3 mt-3 shadow-sm">
                            FINALIZAR COMPRA
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <a href="/" class="text-muted small text-decoration-none">← Volver al catálogo</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
